<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="lens" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#a395f8"/>
      <stop offset="100%" stop-color="#4a35c0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1a1635"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Magnifying glass lens fill -->
  <circle cx="13.5" cy="13.5" r="9.5" fill="url(#lens)"/>

  <!-- Lens ring -->
  <circle cx="13.5" cy="13.5" r="9.5" fill="none" stroke="#ffd166" stroke-width="2" filter="url(#glow)"/>

  <!-- Question mark -->
  <text x="13.5" y="18.2"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" font-weight="900"
        text-anchor="middle"
        fill="white"
        filter="url(#glow)">?</text>

  <!-- Handle -->
  <line x1="20.8" y1="20.8" x2="28" y2="28"
        stroke="#ffd166" stroke-width="3.2" stroke-linecap="round"
        filter="url(#glow)"/>
</svg>
